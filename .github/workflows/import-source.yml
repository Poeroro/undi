name: Import Undi Source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source archive
        run: |
          set -euo pipefail
          curl -L --fail --retry 5 --retry-delay 2 -o /tmp/undi-source.zip "https://tmpfiles.org/dl/wLwbgpjiB3c0/undi-source.zip"
          echo "a3274a7a26ec81759a7d122f6e8a5f707e415c51e7e6c3cc97de99717690721a  /tmp/undi-source.zip" | sha256sum -c -

      - name: Replace repository files
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          python3 - <<'PY'
          import zipfile
          zipfile.ZipFile('/tmp/undi-source.zip').extractall('.')
          PY

      - name: Commit source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Import Undi source"
          git push
